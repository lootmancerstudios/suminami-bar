# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        SumiNami Bar                               ║
# ║                   Configuration File                              ║
# ╚═══════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────
# Color Scheme
# ─────────────────────────────────────────────────────────────────────
# Available: kanagawa, kanagawa-dragon, kanagawa-lotus, kanagawa-blossom
#            catppuccin-mocha, catppuccin-macchiato, catppuccin-frappe, catppuccin-latte
#            gruvbox-dark
color_scheme=kanagawa

# ─────────────────────────────────────────────────────────────────────
# Modules (true/false)
# ─────────────────────────────────────────────────────────────────────
module_taskbar=false
module_media=true
module_weather=true
module_bluetooth=true
module_backlight=true
module_traffic=false

# ─────────────────────────────────────────────────────────────────────
# Thresholds
# ─────────────────────────────────────────────────────────────────────
# CPU (percentage)
cpu_warning=50
cpu_critical=80

# Memory (percentage)
memory_warning=60
memory_critical=85

# Temperature (celsius)
temp_warning=70
temp_critical=85

# Battery (percentage, triggers below this value)
battery_warning=30
battery_critical=15

# ─────────────────────────────────────────────────────────────────────
# Commands (customize for your setup)
# ─────────────────────────────────────────────────────────────────────
# Application launcher (default: wofi)
launcher_command=wofi --show drun

# WiFi picker on network click (leave empty to use built-in wifi-picker)
wifi_click_command=

# Bluetooth picker on bluetooth click (leave empty to use built-in bluetooth-picker)
bluetooth_click_command=

# ─────────────────────────────────────────────────────────────────────
# Behavior
# ─────────────────────────────────────────────────────────────────────
# Weather location (leave empty for auto-detect via IP)
# Formats: City, City,Country, City,State, Airport code, Coordinates
# Examples: London | Paris,France | Austin,TX | JFK | 48.8567,2.3508
weather_location=

# Tooltip delay in milliseconds (requires waybar restart)
tooltip_delay=200
