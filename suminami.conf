# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        SumiNami Bar                               ║
# ║                   Configuration File                              ║
# ╚═══════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────
# Color Scheme
# ─────────────────────────────────────────────────────────────────────
# Available: kanagawa, kanagawa-dragon, kanagawa-lotus, kanagawa-blossom
#            catppuccin-mocha, catppuccin-macchiato, catppuccin-frappe, catppuccin-latte
#            gruvbox-dark
color_scheme=kanagawa-blossom

# ─────────────────────────────────────────────────────────────────────
# Modules (true/false)
# ─────────────────────────────────────────────────────────────────────
module_taskbar=false
module_media=true
module_weather=true
module_bluetooth=true
module_backlight=true
module_traffic=false

# ─────────────────────────────────────────────────────────────────────
# Thresholds
# ─────────────────────────────────────────────────────────────────────
# CPU (percentage)
cpu_warning=50
cpu_critical=80

# Memory (percentage)
memory_warning=60
memory_critical=85

# Temperature (celsius)
temp_warning=70
temp_critical=85

# Battery (percentage, triggers below this value)
battery_warning=30
battery_critical=15

# ─────────────────────────────────────────────────────────────────────
# Behavior
# ─────────────────────────────────────────────────────────────────────
# Weather location (leave empty for auto-detect)
weather_location=

# Tooltip delay in milliseconds (requires waybar restart)
tooltip_delay=200
